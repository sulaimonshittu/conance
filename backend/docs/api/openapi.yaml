openapi: 3.0.3
info:
  title: Conance API
  description: Financial trust layer for Nigerian artisans using Squad Escrow and Gemini AI.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /auth/otp:
    post:
      summary: Request a phone OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_number:
                  type: string
                  example: "+2348000000000"
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  otp: {type: string, description: "Only returned in sandbox/hackathon mode"}

  /auth/verify:
    post:
      summary: Verify OTP and get token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_number: {type: string}
                otp: {type: string}
      responses:
        '200':
          description: Verification successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: {type: string}
                  message: {type: string}

  /jobs:
    post:
      summary: Post a new job and initialize escrow
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id: {type: string, format: uuid}
                title: {type: string}
                description: {type: string}
                category: {type: string}
                budget_kobo: {type: integer, description: "Amount in NGN Kobo"}
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /jobs/voice:
    post:
      summary: Post a new job using a voice note (STT + intent extraction)
      tags: [AI, Jobs]
      parameters:
        - name: client_id
          in: query
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          audio/mp3:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Job created from voice
          content:
            application/json:
              schema:
                type: object
                properties:
                  job: {$ref: '#/components/schemas/Job'}
                  transcript: {type: string}
                  intent: {type: object}

  /jobs/{id}/recommendations:
    get:
      summary: Get AI-ranked artisan recommendations
      tags: [AI, Jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: AI recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations: {type: string}

  /artisans/{id}/recommendations:
    get:
      summary: Get AI-ranked job recommendations for an artisan
      tags: [AI, Artisans]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: AI job recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations: {type: string}

  /jobs/{id}/proposals:
    post:
      summary: Artisan submits a proposal (bid) for a job
      tags: [Proposals]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artisan_id: {type: string, format: uuid}
                price_kobo: {type: integer}
                eta_minutes: {type: integer}
                message: {type: string, description: "Optional; if omitted AI drafts it"}
      responses:
        '200':
          description: Proposal submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proposal'
    get:
      summary: List proposals for a job (client view)
      tags: [Proposals]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Proposal'

  /proposals/{id}/accept:
    post:
      summary: Client accepts a proposal (hire artisan)
      tags: [Proposals]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id: {type: string, format: uuid}
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}

  /jobs/{id}/messages:
    post:
      summary: Send a chat message (moderated)
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sender_id: {type: string, format: uuid}
                body: {type: string}
      responses:
        '200':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /jobs/{id}/disputes:
    post:
      summary: Open a dispute on a job (AI mediator suggests split)
      tags: [Disputes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                opener_id: {type: string, format: uuid}
                reason: {type: string}
      responses:
        '200':
          description: Dispute opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'

  /disputes/{id}/accept-mediation:
    post:
      summary: Accept mediation outcome and settle job
      tags: [Disputes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actor_id: {type: string, format: uuid}
                resolution: {type: object}
      responses:
        '200':
          description: Settled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}

  /jobs/{id}/submit:
    post:
      summary: Artisan submits work for verification
      tags: [Jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artisan_id: {type: string, format: uuid}
                photos: {type: array, items: {type: string}}
                note: {type: string}
      responses:
        '200':
          description: Work submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}

  /jobs/{id}/release:
    post:
      summary: Client releases funds from escrow
      tags: [Jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id: {type: string, format: uuid}
      responses:
        '200':
          description: Funds released
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}

  /jobs/{id}/assign:
    post:
      summary: Client hires an artisan for a funded job (assign artisan)
      tags: [Jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artisan_id: {type: string, format: uuid}
      responses:
        '200':
          description: Assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}

  /jobs/{id}/in-progress:
    post:
      summary: Artisan marks a job as in progress
      tags: [Jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: In progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}

  /ai/transcribe:
    post:
      summary: Transcribe artisan voice note (STT)
      tags: [AI]
      requestBody:
        required: true
        content:
          audio/mp3:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Transcription text
          content:
            text/plain:
              schema: {type: string}

  /payout/account/lookup:
    post:
      summary: Validate bank account name with Squad (account lookup)
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bank_code: {type: string, example: "000013"}
                account_number: {type: string, example: "0123456789"}
      responses:
        '200':
          description: Account lookup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: integer}
                  success: {type: boolean}
                  message: {type: string}
                  data:
                    type: object
                    properties:
                      account_name: {type: string}
                      account_number: {type: string}

components:
  schemas:
    Job:
      type: object
      properties:
        id: {type: string, format: uuid}
        client_id: {type: string, format: uuid}
        title: {type: string}
        status: {type: string}
        budget_kobo: {type: integer}
        squad_virtual_account: {type: string}

    Proposal:
      type: object
      properties:
        id: {type: string, format: uuid}
        job_id: {type: string, format: uuid}
        artisan_id: {type: string, format: uuid}
        price_kobo: {type: integer}
        eta_minutes: {type: integer}
        message: {type: string}
        status: {type: string}

    Message:
      type: object
      properties:
        id: {type: string, format: uuid}
        job_id: {type: string, format: uuid}
        sender_id: {type: string, format: uuid}
        body: {type: string}
        redacted_body: {type: string, nullable: true}
        risk_scores_json: {type: object, nullable: true}

    Dispute:
      type: object
      properties:
        id: {type: string, format: uuid}
        job_id: {type: string, format: uuid}
        opener_id: {type: string, format: uuid}
        reason: {type: string}
        ai_recommendation_json: {type: object, nullable: true}
        resolution_json: {type: object, nullable: true}
        state: {type: string}
