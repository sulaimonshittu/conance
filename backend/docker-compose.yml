services:
  db:
    image: postgis/postgis:15-3.3
    container_name: conance_db
    environment:
      POSTGRES_USER: conance_user
      POSTGRES_PASSWORD: conance_password
      POSTGRES_DB: conance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: conance_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
